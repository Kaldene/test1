name: Quality Pipeline

on: [push, pull_request]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint pytest pytest-cov bandit

    - name: Lint with pylint
      run: |
        # Проверяем только наш простой файл. Отключаем строгие проверки документации.
        pylint simple_demo.py --fail-under=7.0 --disable=C0114,C0115,C0116,R0903

    - name: Security scan with bandit
      run: |
        bandit -r . -ll -f json -o bandit-report.json || true

    - name: Run tests with coverage
      run: |
        # Запускаем тесты внутри файла simple_demo.py
        pytest simple_demo.py --cov=simple_demo --cov-fail-under=70 --cov-report=term-missing

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: htmlcov/