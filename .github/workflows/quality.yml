name: Quality Pipeline

on: [push, pull_request]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint pytest pytest-cov bandit

    - name: Lint with pylint (Static Analysis)
      run: |
        # Проверяем только сервисы и сущности, игнорируем main.py и тесты
        # Отключаем строгие проверки стиля, чтобы не падать из-за мелочей
        pylint generated_services generated_entities --fail-under=7.0 --disable=C0114,C0115,C0116,R0902,W0611,C0415,C0304

    - name: Security scan with bandit (SAST)
      run: |
        # Поиск потенциальных уязвимостей безопасности
        bandit -r . -ll -f json -o bandit-report.json || true

    - name: Run tests with coverage (Dynamic Analysis)
      run: |
        # Запуск юнит-тестов и проверка покрытия кода.
        # Coverage fail-under=70 гарантирует, что пайплайн упадет при низком покрытии.
        # Игнорируем main.py в покрытии, так как это CLI интерфейс
        pytest test_library.py --cov=. --cov-fail-under=70 --cov-report=term-missing --ignore=main.py

    - name: Upload coverage report (Artifact)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: htmlcov/